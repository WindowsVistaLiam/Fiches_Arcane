<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Archive RP évolutive pour répertorier les personnages, histoires, pouvoirs et notes de jeu." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css" />
<title>Archives RP — Personnages</title>
</head>
<body data-page="characters">
<div class="ambient"><span></span><span></span><span></span></div>
<header class="site-header">
  <a class="brand" href="index.html" aria-label="Retour à l’accueil">
    <span class="brand-mark">◆</span>
    <span>Archives RP</span>
  </a>
  <button class="menu-btn" type="button" aria-label="Ouvrir le menu" aria-expanded="false">☰</button>
  <nav class="nav" aria-label="Navigation principale">
    <a href="index.html">Accueil</a>
    <a href="personnages.html">Personnages</a>
    <a href="fiche.html?id=ron-ironheart">Exemple fiche</a>
  </nav>
</header>
<main class="container page-enter">
  <section class="catalog-hero">
    <p class="eyebrow">Catalogue</p>
    <h1>Personnages</h1>
    <p class="lead small">Recherche par nom, région, faction, rôle ou mot-clé. Les filtres sont générés depuis les données : plus tu ajoutes de fiches, plus le catalogue s’enrichit.</p>
  </section>
  <section class="toolbar glass-card" aria-label="Filtres du catalogue">
    <label class="search-wrap">
      <span>Recherche</span>
      <input id="searchInput" type="search" placeholder="Ex : Piltover, feu, Pacifieurs…" autocomplete="off" />
    </label>
    <label>
      <span>Région</span>
      <select id="regionFilter"><option value="">Toutes</option></select>
    </label>
    <label>
      <span>Faction</span>
      <select id="factionFilter"><option value="">Toutes</option></select>
    </label>
    <button id="resetFilters" class="btn ghost" type="button">Réinitialiser</button>
  </section>
  <div id="resultCount" class="result-count"></div>
  <section id="characterGrid" class="cards-grid catalog"></section>
</main>
<footer class="footer">Pour ajouter une fiche : modifier uniquement <code>assets/js/data.js</code>.</footer>
<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
